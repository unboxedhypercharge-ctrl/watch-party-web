<!DOCTYPE html>
<html>
<head>
  <title>Watch Party</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <style>
    body { font-family: Arial; background: #111; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    :root { --plyr-color-main: #ff4757; }
    
    h1 { margin-top: 0; }
    #status { color: yellow; font-size: 18px; margin-bottom: 20px; }

    .main-layout { display: flex; width: 95%; max-width: 1400px; gap: 20px; align-items: flex-start; }
    .player-wrapper { flex-grow: 1; position: relative; box-shadow: 0px 0px 30px rgba(0,0,0,0.9); border-radius: 10px; overflow: hidden; background: black; }
    
    .sidebar { width: 320px; background: #222; border-radius: 10px; padding: 15px; box-shadow: 0px 0px 15px rgba(0,0,0,0.5); max-height: 600px; overflow-y: auto; }
    .sidebar h2 { margin-top: 0; font-size: 20px; border-bottom: 2px solid #ff4757; padding-bottom: 10px; }
    
    .direct-link-box { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #444; }
    .direct-link-box p { margin: 0 0 10px 0; font-size: 14px; font-weight: bold; color: #00ff00; }
    
    .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
    .search-box input { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; background: #444; color: white; }
    .search-box button { padding: 10px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    
    .anime-result { display: flex; gap: 10px; background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: left; border: 1px solid transparent; }
    .anime-result:hover { border-color: #ff4757; background: #444; }
    .anime-result img { width: 50px; height: 70px; object-fit: cover; border-radius: 3px; }
    .anime-result div { display: flex; flex-direction: column; justify-content: center; }
    .anime-result h4 { margin: 0 0 5px 0; font-size: 14px; color: white; }
    .anime-result p { margin: 0; font-size: 12px; color: #aaa; }

    #join-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
    #join-btn { padding: 20px 40px; font-size: 24px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    
    .tools-container { margin-top: 20px; display: flex; justify-content: center; gap: 10px; width: 100%; }
    .custom-file-upload { border: 2px solid #ff4757; color: #ff4757; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .custom-file-upload:hover { background: #ff4757; color: white; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <h1 id="room-title">Room: Loading...</h1>
  <p id="status">Connecting to Sync Server...</p>

  <div class="main-layout">
    <div class="player-wrapper">
      <div id="join-overlay">
        <button id="join-btn">Click to Join Room</button>
      </div>
      <video id="myVideo" controls crossorigin playsinline>
        <track id="myTrack" kind="captions" label="Custom Subtitles" srclang="en" src="" default>
      </video>
    </div>

    <div class="sidebar">
      
      <div class="direct-link-box">
        <p>Direct Video Link</p>
        <div class="search-box">
          <input type="text" id="direct-input" placeholder="Paste .mp4 or .m3u8 link...">
          <button id="direct-btn">Play</button>
        </div>
      </div>

      <h2>🔍 Search Anime</h2>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="e.g. Naruto, Bleach...">
        <button id="search-btn">Search</button>
      </div>
      <div id="results-container">
        <p style="color: #aaa; font-size: 14px; text-align: center;">Search to start watching!</p>
      </div>
    </div>
  </div>

  <div class="tools-container">
    <label class="custom-file-upload">
      <input type="file" id="subtitle-upload" accept=".vtt,.srt">
      Upload Custom Subtitles (.vtt)
    </label>
  </div>

  <script>
    const serverUrl = 'https://watch-party-server-bjmb.onrender.com'; 
    const socket = io(serverUrl);
    const video = document.getElementById('myVideo');
    const track = document.getElementById('myTrack');
    const statusText = document.getElementById('status');
    const joinOverlay = document.getElementById('join-overlay');
    const joinBtn = document.getElementById('join-btn');
    const subtitleUpload = document.getElementById('subtitle-upload');

    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const resultsContainer = document.getElementById('results-container');
    const directInput = document.getElementById('direct-input');
    const directBtn = document.getElementById('direct-btn');

    let player; 
    let hls; 
    let hasJoined = false; 
    let bufferTimeout;
    let intendedState = 'paused';
    let intendedSpeed = 1;
    let ignoreNextSeek = false;
    let isGracePeriod = true; 

    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room');

    if (!roomId) {
      roomId = prompt("Enter a Room Name to join or create:");
      if (!roomId) roomId = "default-room"; 
      window.location.search = `?room=${roomId}`; 
    }

    document.getElementById('room-title').innerText = `Room: ${roomId}`;

    directBtn.addEventListener('click', () => {
      const url = directInput.value.trim();
      if (!url) return;
      if (!hasJoined) return alert("Please click Join Room first!");
      
      socket.emit('change_video', url);
      directInput.value = ''; 
    });

    const AMVSTR_URL = 'https://api.amvstr.me/api/v2';

    searchBtn.addEventListener('click', async () => {
      const query = searchInput.value.trim();
      if (!query) return;
      resultsContainer.innerHTML = '<p style="color: yellow; text-align: center;">Searching...</p>';
      try {
        const response = await fetch(`${AMVSTR_URL}/search?q=${query}`);
        const data = await response.json();
        resultsContainer.innerHTML = ''; 
        if (!data.results || data.results.length === 0) {
          resultsContainer.innerHTML = '<p style="color: red; text-align: center;">No anime found.</p>';
          return;
        }
        data.results.forEach(anime => {
          const div = document.createElement('div');
          div.className = 'anime-result';
          const imageUrl = anime.coverImage.large || anime.coverImage.extraLarge;
          const title = anime.title.english || anime.title.romaji;
          div.innerHTML = `
            <img src="${imageUrl}" alt="poster">
            <div><h4>${title}</h4><p>${anime.format || 'TV'}</p></div>
          `;
          div.addEventListener('click', () => loadAnimeEpisode(anime.id, title));
          resultsContainer.appendChild(div);
        });
      } catch (error) {
        resultsContainer.innerHTML = '<p style="color: red; text-align: center;">Error fetching data. API is down.</p>';
      }
    });

    async function loadAnimeEpisode(animeId, animeTitle) {
      if (!hasJoined) return alert("Please click Join Room first!");
      resultsContainer.innerHTML = '<p style="color: yellow; text-align: center;">Fetching Episode 1...</p>';
      try {
        const infoRes = await fetch(`${AMVSTR_URL}/info/${animeId}`);
        const infoData = await infoRes.json();
        const firstEpisodeId = infoData.episodes[0].id;
        const watchRes = await fetch(`${AMVSTR_URL}/stream/${firstEpisodeId}`);
        const watchData = await watchRes.json();
        const streamLink = watchData.stream.multi.main.url;
        socket.emit('change_video', streamLink);
        resultsContainer.innerHTML = `<p style="color: #00ff00; text-align: center;">Now Playing: ${animeTitle}</p>`;
      } catch (error) {
        alert("Failed to load episode. The provider is down.");
      }
    }

    function loadVideo(url) {
      if (hls) hls.destroy(); 
      
      if (url.includes('.mp4') || url.includes('video-proxy')) {
        video.src = url;
        if (!player) {
          player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'fullscreen'], settings: ['quality', 'speed'] });
          setupSyncLogic();
        }
      } 
      else if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          if (!player) {
            player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'fullscreen'], settings: ['quality', 'speed'] });
            setupSyncLogic(); 
          }
        });
      }
    }

    socket.on('sync_new_video', (newUrl) => {
      statusText.innerText = 'Loading new video...';
      statusText.style.color = 'yellow';
      ignoreNextSeek = true;
      isGracePeriod = true;
      intendedState = 'playing';
      loadVideo(newUrl); 
      setTimeout(() => { if(player) player.play(); }, 1000);
    });

    subtitleUpload.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) { socket.emit('upload_subtitle', e.target.result); };
        reader.readAsText(file);
      }
    });

    socket.on('sync_subtitle', (vttText) => {
      const blob = new Blob([vttText], { type: 'text/vtt' });
      const url = URL.createObjectURL(blob);
      const oldTrack = document.getElementById('myTrack');
      if (oldTrack) oldTrack.remove();
      const newTrack = document.createElement('track');
      newTrack.id = 'myTrack';
      newTrack.kind = 'captions';
      newTrack.label = 'Custom Subtitles';
      newTrack.srclang = 'en';
      newTrack.src = url;
      newTrack.default = true;
      video.appendChild(newTrack);
      setTimeout(() => { if(player) player.captions.toggled = true; }, 200);
      alert("Subtitles updated and turned on!");
    });

    function setupSyncLogic() {
      player.on('play', () => {
        if (hasJoined && intendedState !== 'playing') socket.emit('play_video', player.currentTime);
      });

      player.on('pause', () => {
        if (hasJoined && intendedState !== 'paused') socket.emit('pause_video', player.currentTime);
      });

      player.on('seeked', () => {
        if (hasJoined) {
          if (ignoreNextSeek) ignoreNextSeek = false; 
          else socket.emit('seek_video', player.currentTime);
        }
      });

      player.on('ratechange', () => {
        if (hasJoined && player.speed !== intendedSpeed) socket.emit('change_speed', player.speed);
      });

      socket.on('sync_play', (time) => { 
        intendedState = 'playing';
        if (Math.abs(player.currentTime - time) > 1.5) {
          ignoreNextSeek = true;
          player.currentTime = time; 
        }
        player.play(); 
      });
      
      socket.on('sync_pause', (time) => { 
        intendedState = 'paused';
        ignoreNextSeek = true;
        player.currentTime = time; 
        player.pause(); 
      });
      
      socket.on('sync_seek', (time) => { 
        ignoreNextSeek = true;
        player.currentTime = time; 
      });

      socket.on('sync_speed', (newSpeed) => {
        intendedSpeed = newSpeed;
        player.speed = newSpeed;
      });

      socket.on('host_time', (hostTime) => {
        if (hasJoined && intendedState === 'playing') {
          if (hostTime - player.currentTime > 2) {
            ignoreNextSeek = true;
            player.currentTime = hostTime; 
          }
        }
      });

      player.on('waiting', () => {
        if(hasJoined && !isGracePeriod) {
          bufferTimeout = setTimeout(() => { socket.emit('i_am_buffering'); }, 1000); 
        }
      });

      player.on('playing', () => {
        clearTimeout(bufferTimeout);
        isGracePeriod = false; 
      });
      
      player.on('canplay', () => {
        clearTimeout(bufferTimeout);
        if(hasJoined && !isGracePeriod) socket.emit('buffer_resolved'); 
      });

      socket.on('force_wait', () => { 
        player.pause(); 
        statusText.innerText = 'Waiting for a friend to buffer...';
        statusText.style.color = 'orange';
      });
      
      socket.on('clear_wait', () => { 
        statusText.innerText = '🟢 Synced and Ready!';
        statusText.style.color = '#00ff00';
        if (intendedState === 'playing') player.play();
      });
    }

    socket.on('connect', () => {
      socket.emit('join_room', roomId);
      statusText.innerText = '🟢 Connected! Click Join.';
      statusText.style.color = '#00ff00';
    });

    joinBtn.addEventListener('click', () => {
      joinOverlay.style.display = 'none';
      player.play().then(() => { 
        player.pause(); 
        socket.emit('request_catch_up');
      }).catch(e => console.log(e));
    });

    socket.on('catch_up', (serverMemory) => {
      ignoreNextSeek = true;
      isGracePeriod = true; 
      
      loadVideo(serverMemory.videoUrl);

      setTimeout(() => {
        if(player) {
          player.currentTime = serverMemory.time;
          intendedSpeed = serverMemory.speed || 1;
          player.speed = intendedSpeed;

          if (serverMemory.subtitle) {
            const blob = new Blob([serverMemory.subtitle], { type: 'text/vtt' });
            const url = URL.createObjectURL(blob);
            const oldTrack = document.getElementById('myTrack');
            if (oldTrack) oldTrack.remove();
            const newTrack = document.createElement('track');
            newTrack.id = 'myTrack';
            newTrack.kind = 'captions';
            newTrack.srclang = 'en';
            newTrack.src = url;
            newTrack.default = true;
            video.appendChild(newTrack);
            setTimeout(() => { player.captions.toggled = true; }, 200);
          }
          
          if (serverMemory.isPlaying) {
            intendedState = 'playing';
            player.play().then(() => { hasJoined = true; }); 
          } else {
            intendedState = 'paused';
            hasJoined = true; 
          }
        }
      }, 500); 
    });

    setInterval(() => {
      if (hasJoined && intendedState === 'playing' && player) {
        socket.emit('heartbeat_time', player.currentTime);
      }
    }, 2000);

  </script>
</body>
</html>
