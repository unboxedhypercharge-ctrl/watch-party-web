<!DOCTYPE html>
<html>
<head>
  <title>Watch Party</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; margin: 0; padding: 20px; }
    .video-container { position: relative; width: 80%; max-width: 1000px; margin: 0 auto; }
    video { width: 100%; border: 3px solid #007bff; border-radius: 10px; background: black; }
    #status { color: yellow; font-size: 18px; margin-bottom: 10px; }
    #join-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
      z-index: 200; border-radius: 10px;
    }
    #join-btn { padding: 20px 40px; font-size: 24px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Watch Party</h1>
  <p id="status">Connecting to Sync Server...</p>

  <div class="video-container">
    <div id="join-overlay">
      <button id="join-btn">Click to Join Room</button>
    </div>
    <video id="myVideo" controls></video>
  </div>

  <script>
    const serverUrl = 'https://watch-party-server-bjmb.onrender.com'; 
    const socket = io(serverUrl);
    const video = document.getElementById('myVideo');
    const statusText = document.getElementById('status');
    const joinOverlay = document.getElementById('join-overlay');
    const joinBtn = document.getElementById('join-btn');

    let isExternalCommand = false;

    const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        console.log("Video loaded and ready to play!");
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    }
    joinBtn.addEventListener('click', () => {
      joinOverlay.style.display = 'none';
      video.play().then(() => { video.pause(); }).catch(e => console.log(e));
    });

    socket.on('connect', () => {
      statusText.innerText = '🟢 Synced and Ready!';
      statusText.style.color = '#00ff00';
    });

    socket.on('catch_up', (serverMemory) => {
      isExternalCommand = true;
      video.currentTime = serverMemory.time;
      if (serverMemory.isPlaying) video.play();
    });

    video.addEventListener('play', () => {
      if (!isExternalCommand) socket.emit('play_video', video.currentTime);
      isExternalCommand = false;
    });

    video.addEventListener('pause', () => {
      if (!isExternalCommand) socket.emit('pause_video', video.currentTime);
      isExternalCommand = false;
    });

    video.addEventListener('seeked', () => {
      if (!isExternalCommand) socket.emit('seek_video', video.currentTime);
      isExternalCommand = false;
    });

    video.addEventListener('waiting', () => {
      statusText.innerText = 'Buffering... pausing room!';
      statusText.style.color = 'orange';
      socket.emit('i_am_buffering');
    });

    video.addEventListener('canplay', () => {
      statusText.innerText = '🟢 Synced and Ready!';
      statusText.style.color = '#00ff00';
      socket.emit('buffer_resolved'); 
    });

    socket.on('sync_play', (time) => { isExternalCommand = true; video.currentTime = time; video.play(); });
    socket.on('sync_pause', (time) => { isExternalCommand = true; video.currentTime = time; video.pause(); });
    socket.on('sync_seek', (time) => { isExternalCommand = true; video.currentTime = time; });
    
    socket.on('force_wait', () => { 
      isExternalCommand = true; 
      video.pause(); 
      statusText.innerText = 'Waiting for a friend to buffer...';
      statusText.style.color = 'orange';
    });
    
    socket.on('clear_wait', () => { 
      statusText.innerText = '🟢 Synced and Ready!';
      statusText.style.color = '#00ff00';
    });

  </script>
</body>
</html>
