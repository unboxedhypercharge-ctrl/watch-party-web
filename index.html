<!DOCTYPE html>
<html>
<head>
  <title>Watch Party</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    body { font-family: Arial; background: #111; color: white; text-align: center; margin: 0; padding: 20px; }
    .video-container { position: relative; width: 80%; max-width: 1000px; margin: 0 auto; }
    
    video { width: 100%; border: 3px solid #007bff; border-radius: 10px; background: black; outline: none; }
    
    #status { color: yellow; font-size: 18px; margin-bottom: 10px; }
    #join-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
      z-index: 200; border-radius: 10px;
    }
    #join-btn { padding: 20px 40px; font-size: 24px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>Watch Party</h1>
  <p id="status">Connecting to Sync Server...</p>

  <div class="video-container">
    <div id="join-overlay">
      <button id="join-btn">Click to Join Room</button>
    </div>
    <video id="myVideo" controls></video>
  </div>

<script>
    const serverUrl = 'https://watch-party-server-bjmb.onrender.com'; 
    const socket = io(serverUrl);
    const video = document.getElementById('myVideo');
    const statusText = document.getElementById('status');
    const joinOverlay = document.getElementById('join-overlay');
    const joinBtn = document.getElementById('join-btn');

    let isSyncing = false; 

    const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    }

    joinBtn.addEventListener('click', () => {
      joinOverlay.style.display = 'none';
      
      isSyncing = true; 
      
      video.play().then(() => { 
        video.pause(); 
        socket.emit('request_catch_up');
      }).catch(e => console.log("Autoplay blocked:", e));
    });

    socket.on('connect', () => {
      statusText.innerText = '🟢 Connected! Click Join.';
      statusText.style.color = '#00ff00';
    });

    socket.on('catch_up', (serverMemory) => {
      isSyncing = true; 
      video.currentTime = serverMemory.time;
      
      if (serverMemory.isPlaying) {
        video.play().then(() => { isSyncing = false; }); 
      } else {
        video.pause();
        isSyncing = false;
      }
    });

    video.addEventListener('play', () => {
      if (!isSyncing) socket.emit('play_video', video.currentTime);
    });

    video.addEventListener('pause', () => {
      if (!isSyncing) socket.emit('pause_video', video.currentTime);
    });

    video.addEventListener('seeked', () => {
      if (!isSyncing) socket.emit('seek_video', video.currentTime);
    });

    socket.on('sync_play', (time) => { 
      isSyncing = true; 
      video.currentTime = time; 
      video.play().then(() => { isSyncing = false; }); 
    });
    
    socket.on('sync_pause', (time) => { 
      isSyncing = true; 
      video.currentTime = time; 
      video.pause(); 
      isSyncing = false; 
    });
    
    socket.on('sync_seek', (time) => { 
      isSyncing = true; 
      video.currentTime = time; 
      setTimeout(() => { isSyncing = false; }, 100); 
    });

    video.addEventListener('waiting', () => {
      if (!isSyncing) {
        statusText.innerText = 'Buffering... pausing room!';
        statusText.style.color = 'orange';
        socket.emit('i_am_buffering');
      }
    });

    video.addEventListener('canplay', () => {
      statusText.innerText = '🟢 Synced and Ready!';
      statusText.style.color = '#00ff00';
      socket.emit('buffer_resolved'); 
    });

    socket.on('force_wait', () => { 
      isSyncing = true; 
      video.pause(); 
      isSyncing = false;
      statusText.innerText = 'Waiting for a friend to buffer...';
      statusText.style.color = 'orange';
    });
    
    socket.on('clear_wait', () => { 
      statusText.innerText = '🟢 Synced and Ready!';
      statusText.style.color = '#00ff00';
    });

  </script>
</body>
</html>
