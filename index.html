<!DOCTYPE html>
<html>
<head>
  <title>Watch Party</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; margin: 0; padding: 20px; }
    .player-wrapper { position: relative; width: 80%; max-width: 1000px; margin: 0 auto; box-shadow: 0px 0px 30px rgba(0,0,0,0.9); border-radius: 10px; overflow: hidden; }
    :root { --plyr-color-main: #ff4757; }
    #status { color: yellow; font-size: 18px; margin-bottom: 10px; }
    
    #join-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 200; }
    #join-btn { padding: 20px 40px; font-size: 24px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    
    .tools-container { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    .custom-file-upload { border: 2px solid #ff4757; color: #ff4757; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .custom-file-upload:hover { background: #ff4757; color: white; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <h1>Watch Party</h1>
  <p id="status">Connecting to Sync Server...</p>

  <div class="player-wrapper">
    <div id="join-overlay">
      <button id="join-btn">Click to Join Room</button>
    </div>
    <video id="myVideo" controls crossorigin playsinline>
      <track id="myTrack" kind="captions" label="Custom Subtitles" srclang="en" src="" default>
    </video>
  </div>

  <div class="tools-container">
    <label class="custom-file-upload">
      <input type="file" id="subtitle-upload" accept=".vtt,.srt">
      Upload Custom Subtitles
    </label>
  </div>

  <script>
    const serverUrl = 'https://watch-party-server-bjmb.onrender.com'; 
    const socket = io(serverUrl);
    const video = document.getElementById('myVideo');
    const statusText = document.getElementById('status');
    const joinOverlay = document.getElementById('join-overlay');
    const joinBtn = document.getElementById('join-btn');
    const subtitleUpload = document.getElementById('subtitle-upload');

    let player; 
    let hasJoined = false; 
    let bufferTimeout;
    
    let intendedState = 'paused';
    let intendedSpeed = 1;
    let ignoreNextSeek = false;

    const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';
    
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        player = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'fullscreen'],
          settings: ['quality', 'speed']
        });
        setupSyncLogic(); 
      });
    }
    subtitleUpload.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          socket.emit('upload_subtitle', e.target.result); 
        };
        reader.readAsText(file);
      }
    });

    socket.on('sync_subtitle', (vttText) => {
      const blob = new Blob([vttText], { type: 'text/vtt' });
      const url = URL.createObjectURL(blob);
      
      const oldTrack = document.getElementById('myTrack');
      if (oldTrack) oldTrack.remove();

      const newTrack = document.createElement('track');
      newTrack.id = 'myTrack';
      newTrack.kind = 'captions';
      newTrack.label = 'Custom Subtitles';
      newTrack.srclang = 'en';
      newTrack.src = url;
      newTrack.default = true;
      
      video.appendChild(newTrack);

      setTimeout(() => {
        if(player) player.captions.toggled = true;
      }, 200);

      alert("Subtitles updated and turned on!");
    });

    function setupSyncLogic() {
      
      player.on('play', () => {
        if (hasJoined && intendedState !== 'playing') socket.emit('play_video', player.currentTime);
      });

      player.on('pause', () => {
        if (hasJoined && intendedState !== 'paused') socket.emit('pause_video', player.currentTime);
      });

      player.on('seeked', () => {
        if (hasJoined) {
          if (ignoreNextSeek) ignoreNextSeek = false; 
          else socket.emit('seek_video', player.currentTime);
        }
      });

      player.on('ratechange', () => {
        if (hasJoined && player.speed !== intendedSpeed) socket.emit('change_speed', player.speed);
      });

      socket.on('sync_play', (time) => { 
        intendedState = 'playing';
        if (Math.abs(player.currentTime - time) > 1) {
          ignoreNextSeek = true;
          player.currentTime = time; 
        }
        player.play(); 
      });
      
      socket.on('sync_pause', (time) => { 
        intendedState = 'paused';
        if (Math.abs(player.currentTime - time) > 1) {
          ignoreNextSeek = true;
          player.currentTime = time; 
        }
        player.pause(); 
      });
      
      socket.on('sync_seek', (time) => { 
        ignoreNextSeek = true;
        player.currentTime = time; 
      });

      socket.on('sync_speed', (newSpeed) => {
        intendedSpeed = newSpeed;
        player.speed = newSpeed;
      });

      player.on('waiting', () => {
        if(hasJoined) bufferTimeout = setTimeout(() => { socket.emit('i_am_buffering'); }, 300);
      });

      player.on('playing', () => clearTimeout(bufferTimeout));
      
      player.on('canplay', () => {
        clearTimeout(bufferTimeout);
        if(hasJoined) socket.emit('buffer_resolved'); 
      });

      socket.on('force_wait', () => { 
        player.pause(); 
        statusText.innerText = 'Waiting for a friend to buffer...';
        statusText.style.color = 'orange';
      });
      
      socket.on('clear_wait', () => { 
        statusText.innerText = '🟢 Synced and Ready!';
        statusText.style.color = '#00ff00';
        if (intendedState === 'playing') player.play();
      });
    }

    socket.on('connect', () => {
      statusText.innerText = '🟢 Connected! Click Join.';
      statusText.style.color = '#00ff00';
    });

    joinBtn.addEventListener('click', () => {
      joinOverlay.style.display = 'none';
      player.play().then(() => { 
        player.pause(); 
        socket.emit('request_catch_up');
      }).catch(e => console.log(e));
    });

    socket.on('catch_up', (serverMemory) => {
      if(player) {
        ignoreNextSeek = true;
        player.currentTime = serverMemory.time;
        
        intendedSpeed = serverMemory.speed || 1;
        player.speed = intendedSpeed;

        if (serverMemory.subtitle) {
          const blob = new Blob([serverMemory.subtitle], { type: 'text/vtt' });
          const url = URL.createObjectURL(blob);
          const oldTrack = document.getElementById('myTrack');
          if (oldTrack) oldTrack.remove();
          const newTrack = document.createElement('track');
          newTrack.id = 'myTrack';
          newTrack.kind = 'captions';
          newTrack.srclang = 'en';
          newTrack.src = url;
          newTrack.default = true;
          video.appendChild(newTrack);
          setTimeout(() => { player.captions.toggled = true; }, 200);
        }
        
        if (serverMemory.isPlaying) {
          intendedState = 'playing';
          player.play().then(() => { hasJoined = true; }); 
        } else {
          intendedState = 'paused';
          hasJoined = true; 
        }
      }
    });
    setInterval(() => {
      if (hasJoined && intendedState === 'playing' && player) {
        socket.emit('heartbeat_time', player.currentTime);
      }
    }, 2000);

  </script>
</body>
</html>
